<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3NT4L AI Photo Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #334155;
        }
        h1 { color: #38bdf8; margin-bottom: 10px; font-size: 26px; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 14px; }
        
        .upload-box {
            border: 2px dashed #334155;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            background: #0f172a;
        }
        input[type="file"] {
            width: 100%;
            color: #94a3b8;
            cursor: pointer;
        }
        
        select {
            width: 100%;
            padding: 12px;
            background: #334155;
            color: white;
            border: none;
            border-radius: 10px;
            margin-bottom: 20px;
            outline: none;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            color: #0f172a;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #64748b;
            border-top: 1px solid #334155;
            padding-top: 15px;
        }
        .brand { color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>M3NT4L AI Editor</h1>
        <p>Premium Cinematic Color Grading</p>
        
        <form action="/edit" method="POST" enctype="multipart/form-data">
            <div class="upload-box">
                <input type="file" name="image" accept="image/*" required>
            </div>
            
            <select name="filter">
                <option value="vibrant">Vibrant Natural Green</option>
                <option value="cinematic">Bright Cinematic Outdoor</option>
            </select>
            
            <button type="submit">Apply & Download</button>
        </form>

        <div class="footer">
            Developed by <span class="brand">M3NT4L</span>
        </div>
    </div>

</body>
  </html>
