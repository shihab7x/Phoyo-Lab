<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3NT4L AI Photo Editor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 40px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 10px; }
        input[type="file"] { background: #334155; width: 100%; padding: 10px; border-radius: 10px; margin: 20px 0; color: #94a3b8; }
        select, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; }
        select { background: #334155; color: white; outline: none; }
        button { background: linear-gradient(135deg, #38bdf8, #818cf8); color: #0f172a; cursor: pointer; }
        .footer { margin-top: 25px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>
    <div class="card">
        <h2>M3NT4L AI Editor</h2>
        <p>One-click professional color grading</p>
        <form action="/edit" method="POST" enctype="multipart/form-data">
            <input type="file" name="image" accept="image/*" required>
            <select name="filter">
                <option value="vibrant">Vibrant Natural Green</option>
                <option value="cinematic">Bright Cinematic</option>
            </select>
            <button type="submit">Apply Filter & Download</button>
        </form>
        <div class="footer">Developed by <b>M3NT4L</b></div>
    </div>
</body>
</html>
